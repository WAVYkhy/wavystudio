<style>
    svg {
        overflow: visible;
    }
    .wave-dashed {
        animation: flowDashed 4s linear infinite, bobDashed 4s ease-in-out infinite;
        transform-origin: center;
    }
    .wave-solid {
        animation: bobSolid 5s ease-in-out infinite;
        transform-origin: center;
    }
    @keyframes flowDashed {
        to {
            stroke-dashoffset: -20;
        }
    }
    @keyframes bobDashed {
        0%, 100% {
            transform: translateY(0);
        }
        50% {
            transform: translateY(-4px);
        }
    }
    @keyframes bobSolid {
        0%, 100% {
            transform: translateY(0);
        }
        50% {
            transform: translateY(4px);
        }
    }
</style>
